<!DOCTYPE html>
<html>
<head>
  <title>Epstein Portal</title>
  <link rel="icon" href="favicon.webp" type="image/webp">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      text-decoration: none;
      color: white;
    }
    
    #overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 5;
    opacity: 1;
    transition: opacity .8s ease;
}
    #overlay.fade-out {
    opacity: 0;
}

    #overlay-text {
    font-family: 'Arial';
    font-size: 2rem;
    letter-spacing: 1px;
    color: #fff;
    transition: opacity .8s ease;
    text-align: center;
    padding: 0 20px;
}
    #overlay.fade-out {
  opacity: 0;
  transition: opacity .8s ease;
}
    img {
      width: 200px;
      transition: transform 0.3s ease;
    }

    .container:hover img {
      transform: scale(1.1);
    }

    p {
      margin-top: 15px;
      opacity: 0.8;
    }

    .epstein {
      width: 367px;
      animation: rgbGlow 3s linear infinite;
    }

    @keyframes rgbGlow {
      0%   { filter: drop-shadow(0 0 20px red); }
      33%  { filter: drop-shadow(0 0 20px lime); }
      66%  { filter: drop-shadow(0 0 20px blue); }
      100% { filter: drop-shadow(0 0 20px red); }
    }
  </style>
  <meta property="og:title" content="Epstein Portal">
  <meta property="og:description" content="Jeffrini Epstini">
  <meta property="og:image" content="https://morisot67.com/sahur.webp">
  <meta property="og:url" content="https://morisot67.com/">
  <meta property="og:type" content="website">
</head>
<body>
  <div id="overlay"><div id="overlay-text">click if you're a diddy blud</div></div>
  <audio id="bgmusic" loop autoplay>
    <source src="https://static.wikia.nocookie.net/stealabr/images/b/b3/DefaultSoundtrackDay.mp3" type="audio/mpeg">
  </audio>

  <a href="https://0930120a.index-education.net/pronote/eleve.html?identifiant=4rKeQr5WtDKskbPk" class="container">
    <img src="sahur.webp" alt="epstein blud" class="shadowfilter epstein"/>
    <p>Click to continue</p>
  </a>
  
  <script src="overlay.js"></script>
  <script src="shake.js"></script>
  <script src="snow.js"></script>
</body>
</html>
